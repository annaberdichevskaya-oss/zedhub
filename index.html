// ── Data (Supabase + localStorage hybrid) ───────────────────────
var SUPA_BASE = "https://wwovdtlnecmatenbpttc.supabase.co/rest/v1";
var SUPA_KEY = "sb_publishable_y4t6yXoSShZPBecPAHDVYw_wuwATq0W";
var LS_KEY = "zedhub_v2";

function supaHeaders() {
  return { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY, "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates" };
}

function loadLocal() {
  try {
    var s = localStorage.getItem(LS_KEY);
    if (s) {
      var d = JSON.parse(s);
      if (d && d.requests) { if (!d.clients) d.clients = []; return d; }
    }
  } catch(e) {}
  return {requests: [], orders: [], clients: [], references: []};
}

async function supaFetch(table) {
  var res = await fetch(SUPA_BASE + "/" + table + "?select=id,data&limit=10000", { headers: supaHeaders() });
  var rows = await res.json();
  return Array.isArray(rows) ? rows.map(function(r){ var d = r.data||{}; d.id = r.id; return d; }) : [];
}

async function cloudLoad() {
  var results = await Promise.all([ supaFetch("requests"), supaFetch("orders"), supaFetch("clients"), supaFetch("refs") ]);
  return { requests: results[0], orders: results[1], clients: results[2], references: results[3] };
}

// Sync queue
var _syncQueue = [];
var _syncTimer = null;

function queueSync(table, record) {
  _syncQueue.push({ table: table, record: record });
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(flushSync, 1000);
}

async function flushSync() {
  var queue = _syncQueue.slice();
  _syncQueue = [];
  for (var i = 0; i < queue.length; i++) {
    var item = queue[i];
    try {
      await fetch(SUPA_BASE + "/" + item.table, {
        method: "POST", headers: supaHeaders(),
        body: JSON.stringify({ id: item.record.id, data: item.record, updated_at: new Date().toISOString() })
      });
    } catch(e) {}
  }
}

async function supaDelete(table, id) {
  try { await fetch(SUPA_BASE + "/" + table + "?id=eq." + id, { method: "DELETE", headers: supaHeaders() }); } catch(e) {}
}

var db = loadLocal();

function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch(e) {}
  updateCounts();
  // Sync all to cloud in background
  db.requests.forEach(function(r){ queueSync("requests", r); });
  db.orders.forEach(function(o){ queueSync("orders", o); });
  (db.clients||[]).forEach(function(c){ queueSync("clients", c); });
}

async function initCloud() {
  try {
    var fresh = await cloudLoad();
    if (fresh && (fresh.requests.length || fresh.orders.length || fresh.clients.length)) {
      db = fresh;
      try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch(e) {}
      render();
      updateCounts();
    }
  } catch(e) {}
}


function renumberAll() {
  if (!confirm("Перенумерувати ВСІ запити (0001, 0002...) та їх ордери (ZED0001...)?\n\nЦе оновить існуючі номери. Продовжити?")) return;
  // Sort requests by current req_num / id to keep chronological order
  var sorted = db.requests.slice().sort(function(a,b){
    return (a.id||0) - (b.id||0);
  });
  var counter = 1;
  var mapping = {}; // old order_id -> new order_id
  sorted.forEach(function(r){
    var newNum = String(counter).padStart(4, "0");
    counter++;
    var oldOrderId = r.order_id;
    r.req_num = newNum;
    // If request had an order_id, update it to ZED+newNum
    if (oldOrderId && oldOrderId !== "Rejected ❌") {
      var newOrderId = "ZED" + newNum;
      mapping[oldOrderId] = newOrderId;
      r.order_id = newOrderId;
    }
  });
  // Update matching orders
  db.orders.forEach(function(o){
    if (mapping[o.order_id]) {
      o.req_id = mapping[o.order_id].replace("ZED","");
      o.order_id = mapping[o.order_id];
    }
  });
  save();
  render();
  alert("Готово! Перенумеровано " + sorted.length + " запитів.");
}

function updateCounts() {
  var active = db.requests.filter(function(r){return r.status !== "Rejected";}).length;
  document.getElementById("cnt-req").textContent = db.requests.length;
  document.getElementById("cnt-ord").textContent = db.orders.length;
  var cliEl = document.getElementById("cnt-cli");
  if (cliEl) cliEl.textContent = (db.clients||[]).length;
  var refEl = document.getElementById("cnt-ref");
  if (refEl) refEl.textContent = (db.references||[]).length;
}

function exportBackup() {
  var blob = new Blob([JSON.stringify(db, null, 2)], {type:"application/json"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "zedhub-backup-" + new Date().toLocaleDateString("uk-UA").replace(/\./g,"-") + ".json";
  a.click();
}

function restoreBackup(file) {
  var r = new FileReader();
  r.onload = function(e) {
    try {
      var d = JSON.parse(e.target.result);
      if (d && d.requests) {
        db = d;
        save();
        render();
        alert("Відновлено: " + d.requests.length + " запитів, " + (d.orders||[]).length + " ордерів");
      }
    } catch(ex) { alert("Помилка відновлення: " + ex.message); }
  };
  r.readAsText(file);
}

var currentTab = "requests";

var ordSearch = "";
var ordSort = "new";

function switchTab(tab) {
  currentTab = tab;
  document.getElementById("tab-req").classList.toggle("active", tab === "requests");
  document.getElementById("tab-ord").classList.toggle("active", tab === "orders");
  document.getElementById("tab-cli").classList.toggle("active", tab === "clients");
  document.getElementById("tab-ref").classList.toggle("active", tab === "reference");
  render();
}

function render() {
  if (currentTab === "requests") renderRequests();

  else if (currentTab === "clients") renderClients();
  else renderReference();
}

// ── REQUESTS ─────────────────────────────────────────────────────

// ── ORDERS ───────────────────────────────────────────────────────
function renderOrders() {
  var filtered = db.orders.filter(function(o) {
    var q = ordSearch.toLowerCase();
    var matchSearch = !q || o.client.toLowerCase().indexOf(q) >= 0 || o.order_id.toLowerCase().indexOf(q) >= 0 || (o.route||"").toLowerCase().indexOf(q) >= 0;
    var matchManager = ordManagerSel.length===0 || ordManagerSel.indexOf(o.manager||"") >= 0;
    var matchLogist = ordLogistSel.length===0 || ordLogistSel.indexOf(o.logist||"") >= 0;
    var matchCargo = !ordCargoFilter || (o.cargo_status||"") === ordCargoFilter;
    return matchSearch && matchManager && matchLogist && matchCargo;
  });
  filtered.sort(function(a,b){
    if (ordSort === "eta" || ordSort === "etd" || ordSort === "cutoff") {
      var fld = ordSort;
      var da = parseDateVal(a[fld]), dbb = parseDateVal(b[fld]);
      // Empty dates go to the bottom
      if (da === null && dbb === null) return 0;
      if (da === null) return 1;
      if (dbb === null) return -1;
      return da - dbb; // soonest first
    }
    var x = (a.order_id||""), y = (b.order_id||"");
    return ordSort === "new" ? y.localeCompare(x, undefined, {numeric:true}) : x.localeCompare(y, undefined, {numeric:true});

  var inTransit = db.orders.filter(function(o){return o.cargo_status==="В дорозі";}).length;

  var delivered = db.orders.filter(function(o){return o.delivery_status==="Доставлено";}).length;

    + "<div class='stat-card'><div class='stat-val' style='color:#16a34a'>" + totalSum.toLocaleString("uk-UA") + " ₴</div><div class='stat-label'>ОБОРОТ ПО ІНВОЙСАХ</div></div>"

  if (!filtered.length) {

function saveRequest(id) {
  var client = gv("rf-client").trim();
  if (!client) { alert("Введіть клієнта"); return; }
  var data = {
    req_num: gv("rf-num"), date: fromISODate(gv("rf-date")), client: client,
    contact: gv("rf-contact"), route: gv("rf-route"), type: gv("rf-type"),
    cargo: gv("rf-cargo"), weight: gv("rf-weight"), ready_date: fromISODate(gv("rf-ready")),
    sum_log: parseFloat(gv("rf-log"))||0, sum_brok: parseFloat(gv("rf-brok"))||0, markup: parseFloat(gv("rf-markup"))||0,
    status: gv("rf-status"), sub_status: gv("rf-status")==="Новий запит" ? gv("rf-substatus") : "", order_id: gv("rf-oid"), manager: gv("rf-manager"),
    docs: gv("rf-docs"), comment: gv("rf-comment")
  };
  if (id) {
    var r = db.requests.find(function(x){return x.id===id;});
    var wasAccepted = r.status === "Accepted";
    var alreadyHasOrder = db.orders.some(function(o){ return o.order_id === r.order_id; });
    Object.assign(r, data);
    if (data.status === "Accepted" && !wasAccepted && !alreadyHasOrder) {
      save(); closeModal();
      createOrder(r.id);
      return;
    }
  } else {
    data.id = nextId(db.requests);
    db.requests.unshift(data);
    if (data.status === "Accepted") {
      var exists = db.orders.some(function(o){ return o.order_id === data.order_id; });
      if (!exists) { save(); closeModal(); createOrder(data.id); return; }
    }
  }
  save(); closeModal(); render();
}

// ── Helpers ──────────────────────────────────────────────────────
function gv(id) { var e=document.getElementById(id); return e ? e.value : ""; }
function escQ(s) { return (s||"").replace(/'/g,"&#39;").replace(/"/g,"&quot;"); }
function nextId(arr) { return arr.reduce(function(m,x){return Math.max(m,x.id||0);},0)+1; }
function closeModal() { document.getElementById("modal-area").innerHTML = ""; }

function toISODate(s) {
  // Convert any date string to yyyy-mm-dd for <input type=date>
  if (!s) return "";
  s = String(s).trim();
  var m = s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})/);
  if (m) {
    var d = m[1].padStart(2,"0"), mo = m[2].padStart(2,"0"), y = m[3];
    if (y.length===2) y = "20"+y;
    return y+"-"+mo+"-"+d;
  }
  // already iso
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,10);
  return "";
}

function fromISODate(s) {
  // Convert yyyy-mm-dd to dd.mm.yyyy for storage/display
  if (!s) return "";
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[3]+"."+m[2]+"."+m[1];
  return s;
}

function fmtDate(s) {
  // Normalize any date to dd.mm.yyyy for display
  if (!s) return "";
  s = String(s).trim();
  var iso = toISODate(s);
  return iso ? fromISODate(iso) : s;
}

function dateInput(id, val) {
  return "<input type='date' id='" + id + "' value='" + toISODate(val||"") + "'>";
}

function parseDateVal(s) {
  if (!s) return null;
  s = String(s).trim();
  // dd.mm.yyyy or dd/mm/yyyy
  var m = s.match(/(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})/);
  if (m) {
    var d = parseInt(m[1],10), mo = parseInt(m[2],10), y = parseInt(m[3],10);
    if (y < 100) y += 2000;
    return new Date(y, mo-1, d).getTime();
  }
  // m/d/yy US format fallback
  var m2 = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (m2) {
    var mo2 = parseInt(m2[1],10), d2 = parseInt(m2[2],10), y2 = parseInt(m2[3],10);
    if (y2 < 100) y2 += 2000;
    return new Date(y2, mo2-1, d2).getTime();
  }
  return null;
}

function genReqNum() {
  var maxNum = 0;
  db.requests.forEach(function(r){
    var n = parseInt(r.req_num, 10);
    if (!isNaN(n) && n > maxNum) maxNum = n;
  });
  return String(maxNum + 1).padStart(4, "0");
}

  document.getElementById("modal-area").innerHTML = html;
}
function saveClient(id) {
  var name = gv("cf-name").trim();
  if (!name) { alert("Введіть назву"); return; }
  var emailsRaw = gv("cf-emails").trim();
  var emails = emailsRaw ? emailsRaw.split(",").map(function(e){return e.trim();}).filter(Boolean) : [];
  var tagsRaw = gv("cf-tags").trim();
  var tags = tagsRaw ? tagsRaw.split(",").map(function(t){return t.trim();}).filter(Boolean) : [];
  var data = { name: name, contact: gv("cf-contact"), phone: gv("cf-phone"), emails: emails, tags: tags, notes: gv("cf-notes") };
  if (!db.clients) db.clients = [];
  if (id) { var cli = db.clients.find(function(x){return x.id===id;}); Object.assign(cli, data); }
  else { data.id = nextId(db.clients); db.clients.unshift(data); }
  save(); closeModal(); render();
}
function deleteClient(id) { if (!confirm("Видалити клієнта?")) return; db.clients = db.clients.filter(function(x){return x.id!==id;}); supaDelete("clients", id); save(); render(); }
function normName(s) {
  return (s||"").toLowerCase().replace(/[«»"'`’]/g,"").replace(/\s+/g," ").trim();
}

// ── REFERENCE (Довідник) ─────────────────────────────────────────
var refSearch = "";

function renderReference() {
  if (!db.references) db.references = [];
  var filtered = db.references.filter(function(x) {
    var q = refSearch.toLowerCase();
    return !q || (x.title||"").toLowerCase().indexOf(q) >= 0 || (x.text||"").toLowerCase().indexOf(q) >= 0;
  });
  var html = "<div class='toolbar'>"
    + "<input class='search-box' placeholder='🔍 Пошук у довіднику...' value='" + refSearch + "' oninput='refSearch=this.value;renderReference()'>"
    + "<button class='btn btn-yellow' onclick='openAddRef()'>+ Додати запис</button>"
    + "</div>";
  if (!filtered.length) {
    html += "<div style='text-align:center;padding:60px;color:#9ca3af'>📚<br>" + (refSearch ? "Нічого не знайдено" : "Додайте перший запис у довідник") + "</div>";
    document.getElementById("main-content").innerHTML = html;
    return;
  }
  html += "<div class='ref-grid'>";
  filtered.forEach(function(x) {
    var links = (x.links||[]).map(function(l){
      var url = l.indexOf("http")===0 ? l : "https://" + l;
      return "<a href='" + url + "' target='_blank' class='ref-link'>🔗 " + l + "</a>";
    }).join("");
    html += "<div class='ref-card'>"
      + "<div class='ref-title'>" + (x.title||"Без назви") + "</div>"
      + (x.text ? "<div class='ref-text'>" + x.text.replace(/\n/g,"<br>") + "</div>" : "")
      + (links ? "<div class='ref-links'>" + links + "</div>" : "")
      + "<div class='ref-actions'>"
      + "<button class='act-btn' onclick='openEditRef(" + x.id + ")'>✏️ Редагувати</button>"
      + "<button class='act-btn del' onclick='deleteRef(" + x.id + ")'>✕</button>"
      + "</div></div>";
  });
  html += "</div>";
  document.getElementById("main-content").innerHTML = html;
}

function openAddRef() { showRefModal(null); }
function openEditRef(id) {
  var x = db.references.find(function(r){return r.id===id;});
  if (x) showRefModal(x);
}

function showRefModal(x) {
  var isEdit = !!x;
  var linksStr = isEdit ? (x.links||[]).join("\n") : "";
  var html = "<div class='modal-bg' id='ref-modal'><div class='modal'>"
    + "<div class='modal-title'>" + (isEdit ? "✏️ Редагувати запис" : "➕ Новий запис") + "</div>"
    + "<div class='form-grid full'><div class='field'><label>НАЗВА *</label><input id='rff-title' value='" + escQ(isEdit ? x.title : "") + "' placeholder='Напр. Контакти митного брокера'></div></div>"
    + "<div class='form-grid full'><div class='field'><label>ТЕКСТ / НОТАТКА</label><textarea id='rff-text' style='min-height:120px'>" + (isEdit ? (x.text||"") : "") + "</textarea></div></div>"
    + "<div class='form-grid full'><div class='field'><label>🔗 ПОСИЛАННЯ (кожне з нового рядка)</label><textarea id='rff-links' style='min-height:70px' placeholder='https://...'>" + escQ(linksStr) + "</textarea></div></div>"
    + "<div class='modal-btns'>"
    + "<button class='btn btn-gray' onclick='closeModal()'>Скасувати</button>"
    + "<button class='btn btn-yellow' onclick='saveRef(" + (isEdit ? x.id : "null") + ")'>Зберегти</button>"
    + "</div></div></div>";
  document.getElementById("modal-area").innerHTML = html;
}

function saveRef(id) {
  var title = gv("rff-title").trim();
  if (!title) { alert("Введіть назву"); return; }
  var linksRaw = gv("rff-links").trim();
  var links = linksRaw ? linksRaw.split("\n").map(function(l){return l.trim();}).filter(Boolean) : [];
  var data = { title: title, text: gv("rff-text"), links: links };
  if (!db.references) db.references = [];
  if (id) {
    var x = db.references.find(function(r){return r.id===id;});
    Object.assign(x, data);
  } else {
    data.id = nextId(db.references);
    db.references.unshift(data);
  }
  saveRefCloud(); closeModal(); render();
}

function deleteRef(id) {
  if (!confirm("Видалити запис?")) return;
  db.references = db.references.filter(function(x){return x.id!==id;});
  supaDelete("refs", id);
  saveRefCloud(); render();
}

function saveRefCloud() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch(e) {}
  updateCounts();
  (db.references||[]).forEach(function(x){ queueSync("refs", x); });
}

function sendOrderMail(orderId) {
  var o = db.orders.find(function(x){return x.id===orderId;});
  if (!o) return;
  var target = normName(o.client);
  var cli = (db.clients||[]).find(function(c){ return normName(c.name)===target; });
  // Fallback: if no exact match and only one client has emails, use it
  if (!cli) {
    var withEmails = (db.clients||[]).filter(function(c){ return c.emails && c.emails.length; });
    if (withEmails.length === 1) cli = withEmails[0];
  }
  var email = cli && cli.emails && cli.emails.length ? cli.emails.join(",") : "";
  if (!email) {
    alert("Email не знайдено для клієнта \"" + (o.client||"") + "\". Додайте email у вкладці Клієнти.");
    switchTab("clients");
    return;
  }
  var subj = encodeURIComponent("Статус контейнера — " + o.order_id + (o.container ? " (" + o.container + ")" : ""));
  var body = encodeURIComponent("Доброго дня!\n\nІнформація по контейнеру:\nORDER ID: " + o.order_id + "\nНомер контейнера: " + (o.container||"—") + "\nСтатус вантажу: " + (o.cargo_status||"—") + "\n\nZ повагою,\nZED Logistics");
  window.open("mailto:" + email + "?subject=" + subj + "&body=" + body, "_blank");
}
function importExcel() { document.getElementById("excel-inp").click(); }
function handleExcel(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, {type:"array"});
      var imported = [];
      if (wb.SheetNames.indexOf("Запити") >= 0) {
        var ws = wb.Sheets["Запити"];
        var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
        var dataRows = rows.slice(3);
        var idCounter = db.requests.reduce(function(m,r){return Math.max(m,r.id||0);},0)+1;
        dataRows.forEach(function(row) {
          var reqNum = String(row[0]||"").trim();
          if (!reqNum) return;
          var clientParts = String(row[1]||"").split(String.fromCharCode(10));
          var routeParts = String(row[2]||"").split(String.fromCharCode(10));
          var r = { id: idCounter++, req_num: reqNum, date: "", client: clientParts[0]||"", contact: clientParts[1]||"", route: routeParts[0]||"", type: routeParts[1]||"", cargo: String(row[3]||""), weight: String(row[4]||""), sum_log: 0, sum_brok: 0, status: String(row[7]||"Новий запит"), order_id: String(row[8]||""), docs: "", comment: "" };
          if (!db.requests.find(function(x){return x.req_num===r.req_num;})) imported.push(r);
        });
      }
      db.requests = imported.concat(db.requests);
      save(); render();
      alert("Імпортовано: " + imported.length + " запитів");
    } catch(err) { alert("Помилка: " + err.message); }
  };
  reader.readAsArrayBuffer(file);
}
function importRejestrXlsx() { document.getElementById("rejestr-xlsx-inp").click(); }
function handleRejestrXlsx(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, {type:"array", cellDates:true});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false, dateNF:"dd.mm.yyyy"});
      if (!db.clients) db.clients = [];
      var clientName = "ТОВ «Гарні речі»";
      if (!db.clients.find(function(c){return c.name===clientName;})) { db.clients.unshift({id:nextId(db.clients), name:clientName, contact:"", phone:"", emails:[], tags:["Основний"], notes:""}); }
      var imported = 0, skipped = 0;
      var ordId = db.orders.reduce(function(m,o){return Math.max(m,o.id||0);},0)+1;
      for (var i = 276; i < rows.length; i++) {
        var row = rows[i];
        if (!row || !row[1]) continue;
        var orderNum = String(row[1]).trim();
        if (!orderNum || orderNum === "номер замовлення") continue;
        if (db.orders.find(function(o){return o.req_id===orderNum;})) { skipped++; continue; }
        var getVal = function(idx) {
          if (!row[idx] && row[idx] !== 0) return "";
          var v = String(row[idx]).trim();
          if (v.match(/^\d{4}-\d{2}-\d{2}/)) { var p=v.split("-"); return p[2].substring(0,2)+"."+p[1]+"."+p[0]; }
          return v;
        };
        var incoRaw = getVal(5);
        var o = { id: ordId++, order_id: "ЗЕД-" + orderNum, client: clientName, route: (incoRaw.split(" ").slice(1).join(" ")||"Китай") + " → Україна", req_id: orderNum, date: getVal(4), incoterms: incoRaw.split(" ")[0]||"", booking: "", carrier: getVal(3), container: getVal(26)||"", cutoff: getVal(6), route_full: "", etd: getVal(8), eta: getVal(10), bol: "", cargo_status: "Очікує завантаження", decl: "", customs_status: "TBD", customs_date: "", resort: "Не потрібна", resort_addr: "", resort_comment: "", logist_ua: getVal(2), transport_ua: "", delivery_status: "Очікує", delivery_date: getVal(13), invoice_sum: parseFloat((getVal(15)||"").replace(/[^0-9.]/g,""))||0, payment_status: "Очікує від фін відділу", payment_date: "", docs: "", notes: getVal(16)+" кор / "+getVal(17)+" кг / "+getVal(18)+" CBM" };
        db.orders.push(o); imported++;
      }
      save(); render();
      alert("Імпортовано: " + imported + " ордерів. Пропущено: " + skipped);
    } catch(err) { alert("Помилка: " + err.message); }
  };
  reader.readAsArrayBuffer(file);
}
function clearAllData() {
  if (!confirm("Видалити ВСІ дані?")) return;
  db = {requests: [], orders: [], clients: [], references: []};
  save(); render();
  alert("Всі дані видалено");
}

// Закривати панель Виконавці при кліку поза нею
document.addEventListener("mousedown", function(e){
  if (!ordExecOpen) return;
  var el = e.target;
  var insidePanel = false;
  while (el) {
    var oc = el.getAttribute ? (el.getAttribute("onclick")||"") : "";
    var och = el.getAttribute ? (el.getAttribute("onchange")||"") : "";
    if (oc.indexOf("ordExecOpen") >= 0 || och.indexOf("toggleExecFilter") >= 0
        || oc.indexOf("toggleExecFilter") >= 0 || oc.indexOf("ordManagerSel=[]") >= 0) {
      insidePanel = true; break;
    }
    el = el.parentElement;
  }
  if (!insidePanel) {
    ordExecOpen = false;
    renderOrders();
  }
});
